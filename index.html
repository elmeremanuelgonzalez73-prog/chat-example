<!DOCTYPE html>
<html lang="es">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Permanente</title>
  <style>
    body { margin:0; font-family: system-ui; background:#121212; color:#fff; }
    #messages {
      list-style: none;
      margin: 0;
      padding: 15px;
      height: calc(100vh - 70px);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    #messages li {
      padding: 10px 15px;
      margin: 6px 0;
      border-radius: 18px;
      max-width: 75%;
      word-wrap: break-word;
    }
    .my-message {
      background: #0084ff;
      color: white;
      align-self: flex-end;
    }
    .other-message {
      background: #2c2c2e;
      color: white;
      align-self: flex-start;
    }
    #form {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #1e1e1e;
      padding: 10px;
      display: flex;
      gap: 8px;
    }
    #input {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 25px;
      background: #2c2c2e;
      color: white;
    }
    button {
      padding: 12px 20px;
      background: #0084ff;
      color: white;
      border: none;
      border-radius: 25px;
    }
  </style>
</head>
<body>
  <ul id="messages"></ul>
  
  <form id="form">
    <input id="input" autocomplete="off" placeholder="Escribe un mensaje..." />
    <button>Enviar</button>
  </form>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    let username = prompt("Ingresa tu nombre:");
    let room = prompt("Código de la sala (o déjalo vacío):") || "general";

    const socket = io();

    socket.emit('join room', { username, room });

    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const messages = document.getElementById('messages');

    // Enviar mensaje
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      if (input.value.trim()) {
        socket.emit('chat message', {
          room: room,
          username: username,
          message: input.value.trim()
        });
        input.value = '';
      }
    });

    // Recibir mensaje nuevo
    socket.on('chat message', (data) => {
      addMessage(data);
    });

    // Cargar historial al entrar
    socket.on('load messages', (history) => {
      history.forEach(msg => addMessage(msg));
    });

    function addMessage(data) {
      const item = document.createElement('li');
      
      if (data.username === username) {
        item.classList.add('my-message');
        item.innerHTML = `<strong>Yo:</strong> ${data.message}`;
      } else {
        item.classList.add('other-message');
        item.innerHTML = `<strong>${data.username}:</strong> ${data.message}`;
      }
      
      messages.appendChild(item);
      messages.scrollTop = messages.scrollHeight;
    }
  </script>
</body>
</html>
