<!DOCTYPE html>
<html lang="es">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    #header {
      background: #1e1e1e;
      padding: 12px 15px;
      display: flex;
      gap: 10px;
      align-items: center;
      border-bottom: 1px solid #333;
    }
    #header input {
      flex: 1;
      padding: 10px;
      background: #2c2c2e;
      border: none;
      border-radius: 8px;
      color: white;
    }
    #header button {
      padding: 10px 18px;
      background: #0084ff;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    #messages {
      list-style: none;
      margin: 0;
      padding: 15px;
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    #messages li {
      padding: 10px 15px;
      margin: 6px 0;
      border-radius: 18px;
      max-width: 75%;
      word-wrap: break-word;
    }
    .my-message { background: #0084ff; color: white; align-self: flex-end; }
    .other-message { background: #2c2c2e; color: white; align-self: flex-start; }

    #form {
      background: #1e1e1e;
      padding: 10px;
      display: flex;
      gap: 8px;
    }
    #input {
      flex: 1;
      padding: 12px;
      background: #2c2c2e;
      border: none;
      border-radius: 25px;
      color: white;
    }
    button[type="submit"] {
      padding: 12px 20px;
      background: #0084ff;
      border: none;
      border-radius: 25px;
      color: white;
    }
  </style>
</head>
<body>

  <!-- Barra superior (sin ventanas flotantes) -->
  <div id="header">
    <input type="text" id="usernameInput" placeholder="Tu nombre" value="Usuario">
    <input type="text" id="roomInput" placeholder="Código de sala" value="general">
    <button onclick="updateInfo()">Actualizar</button>
  </div>

  <ul id="messages"></ul>

  <form id="form">
    <input id="input" autocomplete="off" placeholder="Escribe un mensaje..." />
    <button type="submit">Enviar</button>
  </form>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    let username = "Usuario";
    let room = "general";
    let socket;

    function startChat() {
      username = document.getElementById("usernameInput").value.trim() || "Usuario";
      room = document.getElementById("roomInput").value.trim() || "general";

      socket = io();
      socket.emit('join room', { username, room });

      socket.on('load messages', (history) => {
        history.forEach(msg => addMessage(msg));
      });

      socket.on('chat message', (data) => {
        addMessage(data);
      });
    }

    function updateInfo() {
      username = document.getElementById("usernameInput").value.trim() || "Usuario";
      room = document.getElementById("roomInput").value.trim() || "general";
      if (socket) socket.emit('join room', { username, room });
    }

    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const messages = document.getElementById('messages');

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      if (input.value.trim() && socket) {
        socket.emit('chat message', {
          room: room,
          username: username,
          message: input.value.trim()
        });
        input.value = '';
      }
    });

    function addMessage(data) {
      const item = document.createElement('li');
      if (data.username === username) {
        item.classList.add('my-message');
        item.innerHTML = `<strong>Yo:</strong> ${data.message}`;
      } else {
        item.classList.add('other-message');
        item.innerHTML = `<strong>${data.username}:</strong> ${data.message}`;
      }
      messages.appendChild(item);
      messages.scrollTop = messages.scrollHeight;
    }

    // Iniciar el chat automáticamente al cargar la página
    window.onload = startChat;
  </script>
</body>
</html>
