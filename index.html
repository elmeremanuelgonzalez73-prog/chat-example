<!DOCTYPE html>
<html lang="es">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat - Sala</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #121212;
      color: #fff;
    }
    #messages {
      list-style-type: none;
      margin: 0;
      padding: 15px;
      height: calc(100vh - 70px);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    #messages li {
      padding: 10px 15px;
      margin: 6px 0;
      border-radius: 18px;
      max-width: 75%;
      word-wrap: break-word;
      line-height: 1.4;
    }
    .my-message {
      background-color: #0084ff;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .other-message {
      background-color: #2c2c2e;
      color: #fff;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    #form {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #1e1e1e;
      padding: 10px;
      display: flex;
      gap: 8px;
    }
    #input {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 25px;
      background: #2c2c2e;
      color: white;
      font-size: 16px;
    }
    #input:focus {
      outline: none;
    }
    button {
      padding: 12px 20px;
      background: #0084ff;
      color: white;
      border: none;
      border-radius: 25px;
      cursor: pointer;
    }
    strong {
      color: #00ff9d;
    }
  </style>
</head>
<body>
  <ul id="messages"></ul>
  
  <form id="form">
    <input id="input" autocomplete="off" placeholder="Escribe un mensaje..." />
    <button>Enviar</button>
  </form>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    let username = "";
    let room = "general";

    // Pedir nombre de usuario
    while (!username) {
      username = prompt("Ingresa tu nombre de usuario:");
    }

    // Pedir código de sala (opcional)
    room = prompt("Ingresa el código de la sala (o déjalo vacío para sala general):") || "general";

    const socket = io();

    // Unirse a la sala
    socket.emit('join room', { username: username, room: room });

    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const messages = document.getElementById('messages');

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      if (input.value.trim()) {
        socket.emit('chat message', {
          room: room,
          username: username,
          message: input.value.trim()
        });
        input.value = '';
      }
    });

    // Recibir mensajes
    socket.on('chat message', (data) => {
      const item = document.createElement('li');
      
      if (data.username === username) {
        item.classList.add('my-message');
        item.innerHTML = `<strong>Yo:</strong> ${data.message}`;
      } else {
        item.classList.add('other-message');
        item.innerHTML = `<strong>${data.username}:</strong> ${data.message}`;
      }

      messages.appendChild(item);
      window.scrollTo(0, document.body.scrollHeight);
    });

    // Mensaje de bienvenida
    socket.on('user joined', (data) => {
      const item = document.createElement('li');
      item.style.color = '#888';
      item.style.textAlign = 'center';
      item.textContent = `${data.username} se unió a la sala`;
      messages.appendChild(item);
      window.scrollTo(0, document.body.scrollHeight);
    });
  </script>
</body>
</html>
