<!DOCTYPE html>
<html lang="es">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Permanente</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #0f0f0f;
      color: #fff;
      height: 100vh;
      overflow: hidden;
    }
    #login {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .login-box {
      background: #1e1e1e;
      padding: 40px 30px;
      border-radius: 16px;
      width: 340px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }
    h2 { margin: 0 0 25px 0; color: #fff; }
    input {
      width: 100%;
      padding: 14px;
      margin: 12px 0;
      background: #2c2c2e;
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 16px;
    }
    button {
      width: 100%;
      padding: 14px;
      background: #0084ff;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 15px;
    }
    button:hover { background: #0066cc; }

    #chat {
      display: none;
      flex-direction: column;
      height: 100vh;
    }
    #messages {
      list-style: none;
      margin: 0;
      padding: 15px;
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    #messages li {
      padding: 10px 15px;
      margin: 6px 0;
      border-radius: 18px;
      max-width: 75%;
      word-wrap: break-word;
    }
    .my-message {
      background: #0084ff;
      color: white;
      align-self: flex-end;
    }
    .other-message {
      background: #2c2c2e;
      color: white;
      align-self: flex-start;
    }
    #form {
      background: #1e1e1e;
      padding: 10px;
      display: flex;
      gap: 8px;
    }
    #input {
      flex: 1;
      padding: 14px;
      background: #2c2c2e;
      border: none;
      border-radius: 25px;
      color: white;
      font-size: 16px;
    }
    button[type="submit"] {
      padding: 14px 24px;
      background: #0084ff;
      border: none;
      border-radius: 25px;
    }
  </style>
</head>
<body>

  <!-- Pantalla de ingreso -->
  <div id="login">
    <div class="login-box">
      <h2>Entrar al Chat</h2>
      <input type="text" id="usernameInput" placeholder="Tu nombre de usuario" maxlength="20">
      <input type="text" id="roomInput" placeholder="Código de la sala" value="general">
      <button onclick="joinChat()">Entrar al Chat</button>
    </div>
  </div>

  <!-- Pantalla del chat -->
  <div id="chat">
    <ul id="messages"></ul>
    
    <form id="form">
      <input id="input" autocomplete="off" placeholder="Escribe un mensaje..." />
      <button type="submit">Enviar</button>
    </form>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    let username = "";
    let room = "general";
    let socket;

    function joinChat() {
      username = document.getElementById("usernameInput").value.trim();
      room = document.getElementById("roomInput").value.trim() || "general";

      if (!username) {
        alert("Por favor ingresa tu nombre de usuario");
        return;
      }

      // Ocultar pantalla de login y mostrar chat
      document.getElementById("login").style.display = "none";
      document.getElementById("chat").style.display = "flex";

      // Conectar al servidor
      socket = io();

      socket.emit('join room', { username, room });

      // Cargar historial de mensajes
      socket.on('load messages', (history) => {
        history.forEach(msg => addMessage(msg));
      });

      // Recibir nuevos mensajes
      socket.on('chat message', (data) => {
        addMessage(data);
      });
    }

    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const messages = document.getElementById('messages');

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      if (input.value.trim() && socket) {
        socket.emit('chat message', {
          room: room,
          username: username,
          message: input.value.trim()
        });
        input.value = '';
      }
    });

    function addMessage(data) {
      const item = document.createElement('li');
      
      if (data.username === username) {
        item.classList.add('my-message');
        item.innerHTML = `<strong>Yo:</strong> ${data.message}`;
      } else {
        item.classList.add('other-message');
        item.innerHTML = `<strong>${data.username}:</strong> ${data.message}`;
      }
      
      messages.appendChild(item);
      messages.scrollTop = messages.scrollHeight;
    }
  </script>
</body>
</html>
